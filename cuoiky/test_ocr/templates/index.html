<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VietOCR - Trích xuất văn bản thông minh</title>
    <meta name="description" content="Ứng dụng trích xuất văn bản từ hình ảnh sử dụng công nghệ OCR tiếng Việt hiện đại.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header>
            <h1 id="main-title">Viet<span>OCR</span></h1>
            <p class="subtitle">Trích xuất văn bản từ hình ảnh của bạn với độ chính xác cao</p>
        </header>

        <section class="glass-panel">
            <div class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <p>Kéo thả ảnh vào đây hoặc click để chọn file</p>
                        <span class="file-info">Hỗ trợ JPG, PNG, JPEG</span>
                    </div>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>

                <div id="preview-container" class="preview-container hidden">
                    <img id="image-preview" src="#" alt="Xem trước">
                    <button id="remove-btn" class="btn-icon"><i class="fas fa-times"></i></button>
                    <div class="preview-overlay">
                        <button id="extract-btn" class="btn-primary">
                            <i class="fas fa-magic"></i> Trích xuất văn bản
                        </button>
                    </div>
                </div>
            </div>

            <div class="result-section">
                <div class="section-header">
                    <h2><i class="fas fa-file-alt"></i> Kết quả</h2>
                    <div class="actions">
                        <button id="copy-btn" class="btn-secondary hidden" title="Sao chép">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
                <div id="stats-container" class="stats-container hidden">
                    <div class="stat-item">
                        <i class="fas fa-keyboard"></i>
                        <span class="stat-label">Ký tự:</span>
                        <span class="stat-value" id="char-count">0</span>
                    </div>
                </div>
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Đang xử lý...</p>
                </div>
                <div id="result-text" class="result-box" placeholder="Kết quả sẽ hiển thị ở đây...">
                    <div class="placeholder-content">
                        <i class="fas fa-ghost"></i>
                        <p>Chưa có dữ liệu</p>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 VietOCR Project. Made with <i class="fas fa-heart"></i></p>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
